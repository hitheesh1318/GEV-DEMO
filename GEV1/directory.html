<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>QUANTUM • Employee Directory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Role guard -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const role = localStorage.getItem("current_user_role") || "wfm";
        if (role !== "wfm") {
          document.body.innerHTML = `
          <div style="min-height:100vh;display:grid;place-items:center;background:#f8fafc;padding:24px;">
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;max-width:600px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.08);">
              <h2 style="margin:0 0 8px;color:#0f172a;">403 • Access Denied</h2>
              <p style="margin:0 0 16px;color:#64748b;">You do not have permission to view the Employee Directory.</p>
              <button onclick="if(window.top) window.top.focus();" style="padding:10px 14px;border:none;border-radius:8px;background:#4f46e5;color:#fff;font-weight:700;cursor:pointer;">Return</button>
            </div>
          </div>`;
        }
      });
    </script>

    <style>
      /* (your original styles here, unchanged) */
      :root {
        --bg-body: #f0f2f5;
        --primary: #4f46e5;
        --secondary: #6366f1;
        --text-dark: #1e293b;
        --white: #ffffff;
        --border: #e2e8f0;
        --muted: #64748b;
        --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg-body);
        color: var(--text-dark);
        display: flex;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 16px;
      }
      .wrap {
        width: min(1000px, 96vw);
      }
      .card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .header {
        background: #f8fafc;
        padding: 16px;
        border-bottom: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }
      .title {
        margin: 0;
        font-size: 26px;
        font-weight: 900;
        color: var(--primary);
        letter-spacing: 0.5px;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .search-box {
        width: 260px;
        max-width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-weight: 600;
        font-size: 14px;
        background: #fff;
      }
      .search-box:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
      }
      .count {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      thead tr {
        background: #0f172a;
        color: #fff;
      }
      th {
        padding: 12px 14px;
        text-align: left;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: middle;
      }
      tbody tr:nth-child(even) {
        background: #fafbfd;
      }
      tbody tr:hover {
        background: #f1f5f9;
      }
      .badge {
        padding: 6px 12px;
        border-radius: 999px;
        background: #fff;
        font-weight: 700;
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-dark);
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .btn {
        appearance: none;
        border: none;
        border-radius: 8px;
        padding: 8px 12px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
      }
      .btn.small {
        padding: 6px 10px;
        font-weight: 700;
      }
      .btn.ghost {
        background: #fff;
        color: var(--text-dark);
        border: 1px solid var(--border);
      }
      .btn.primary {
        background: var(--secondary);
        color: #fff;
      }
      .empty {
        padding: 20px;
        text-align: center;
        color: var(--muted);
      }
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 1000;
      }
      .modal.show {
        display: flex;
      }
      .modal-card {
        width: min(560px, 96vw);
        background: #fff;
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        overflow: hidden;
      }
      .modal-header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: #f8fafc;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .modal-title {
        margin: 0;
        font-size: 16px;
        font-weight: 900;
      }
      .modal-body {
        padding: 16px;
        display: grid;
        gap: 12px;
      }
      .form-row {
        display: grid;
        gap: 6px;
      }
      .form-row label {
        font-size: 12px;
        color: var(--muted);
        font-weight: 800;
      }
      .form-row input,
      .form-row select {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 14px;
        background: #fff;
      }
      .form-row input:focus,
      .form-row select:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
      }
      .modal-footer {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        background: #fff;
      }
      @media (max-width: 640px) {
        .header {
          grid-template-columns: 1fr;
        }
        .toolbar {
          justify-content: space-between;
        }
        .search-box {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="header">
          <h1 class="title">QUANTUM</h1>
          <div class="toolbar">
            <input
              id="searchInput"
              type="text"
              placeholder="Search by name…"
              class="search-box"
            />
            <div id="resultCount" class="count">0 results</div>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Emp ID</th>
              <th>Name</th>
              <th>Team Lead</th>
              <th style="width: 160px">Actions</th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
        <div id="emptyState" class="empty" style="display: none">
          No matching employees found.
        </div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="empModal" aria-hidden="true" role="dialog">
      <div class="modal-card" role="document">
        <div class="modal-header">
          <h3 id="modalTitle" class="modal-title">Edit Employee</h3>
          <button class="btn ghost small" id="btnCloseModal" aria-label="Close">
            Close
          </button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <label for="editId"
              >Employee ID <span style="color: #ef4444">*</span></label
            >
            <input type="text" id="editId" placeholder="e.g., EMP010" />
          </div>
          <div class="form-row">
            <label for="editName"
              >Full Name <span style="color: #ef4444">*</span></label
            >
            <input type="text" id="editName" placeholder="e.g., Priya Sharma" />
          </div>
          <div class="form-row">
            <label for="editTL">Team Lead</label>
            <select id="editTL">
              <option value="">— Select —</option>
              <option value="Lead_Alpha">Lead_Alpha</option>
              <option value="Lead_Beta">Lead_Beta</option>
              <option value="Lead_Gamma">Lead_Gamma</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn ghost" id="btnDelete" title="Remove this employee">
            Delete
          </button>
          <button class="btn primary" id="btnSave">Save</button>
        </div>
      </div>
    </div>

    <script>
      /* ===================== Data Store ===================== */
      let employees = [];
      let searchTerm = "";
      let editingIndex = -1;
      let originalId = "";

      // Load employees from API
      async function loadEmployees() {
        try {
          const resp = await fetch("/api/employees");
          if (!resp.ok) throw new Error(`Failed to load: ${resp.status}`);
          const data = await resp.json();
          employees = data.map((emp) => ({
            id: emp.id,
            name: emp.name,
            tl: emp.tl,
          }));
          console.log("✅ Loaded", employees.length, "employees from API");
          reRender();
        } catch (err) {
          console.error("❌ Failed to load employees:", err);
          alert("Failed to load employees. Check server connection.");
        }
      }

      // Update employee via API
      async function updateEmployee(empId, name, tl) {
        try {
          const resp = await fetch(`/api/employees/${empId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, tl }),
          });
          if (!resp.ok) throw new Error(`Failed: ${resp.status}`);
          console.log("✅ Employee updated:", empId);
          return true;
        } catch (err) {
          console.error("❌ Failed to update:", err);
          throw err;
        }
      }

      // Delete employee via API
      async function deleteEmployee(empId) {
        try {
          const resp = await fetch(`/api/employees/${empId}`, {
            method: "DELETE",
          });
          if (!resp.ok) throw new Error(`Failed: ${resp.status}`);
          console.log("✅ Employee deleted:", empId);
          return true;
        } catch (err) {
          console.error("❌ Failed to delete:", err);
          throw err;
        }
      }

      /* ===================== DOM Refs ===================== */
      const $input = document.getElementById("searchInput");
      const $body = document.getElementById("recordsBody");
      const $empty = document.getElementById("emptyState");
      const $count = document.getElementById("resultCount");

      // Modal refs
      const $modal = document.getElementById("empModal");
      const $btnClose = document.getElementById("btnCloseModal");
      const $btnSave = document.getElementById("btnSave");
      const $btnDelete = document.getElementById("btnDelete");
      const $modalTitle = document.getElementById("modalTitle");

      const $editId = document.getElementById("editId");
      const $editName = document.getElementById("editName");
      const $editTL = document.getElementById("editTL");

      /* ===================== State ===================== */
      let searchTerm = "";
      let editingIndex = -1;
      let originalId = "";

      /* ===================== Render ===================== */
      function renderRows(rows) {
        if (!rows || rows.length === 0) {
          $body.innerHTML = "";
          $empty.style.display = "block";
          $count.textContent = "0 results";
          return;
        }
        $empty.style.display = "none";
        $count.textContent = `${rows.length} ${rows.length === 1 ? "result" : "results"}`;

        $body.innerHTML = rows
          .map(
            (e) => `
        <tr>
          <td><b>${e.id}</b></td>
          <td>${e.name || ""}</td>
          <td><span class="badge">${e.tl || "-"}</span></td>
          <td>
            <div class="actions">
              <button class="btn ghost small" data-action="edit" data-id="${e.id}">Edit</button>
            </div>
          </td>
        </tr>
      `,
          )
          .join("");
      }

      function filterByName(q) {
        if (!q) return employees.slice();
        q = q.trim().toLowerCase();
        return employees.filter((e) =>
          (e.name || "").toLowerCase().includes(q),
        );
      }

      function reRender() {
        renderRows(filterByName(searchTerm));
      }

      /* ===================== Modal helpers ===================== */
      function openModalEdit(empId) {
        editingIndex = employees.findIndex((x) => x.id === empId);
        if (editingIndex === -1) return;

        const e = employees[editingIndex];
        $modalTitle.textContent = `Edit: ${e.id}`;
        $editId.value = e.id;
        $editName.value = e.name || "";
        $editTL.value = e.tl || "";
        originalId = e.id;

        showModal();
      }
      function showModal() {
        $modal.classList.add("show");
        $modal.setAttribute("aria-hidden", "false");
        setTimeout(() => $editName.focus(), 50);
      }
      function closeModal() {
        $modal.classList.remove("show");
        $modal.setAttribute("aria-hidden", "true");
      }

      function validate(eid, name) {
        if (!eid || !name) {
          alert("Employee ID and Name are required.");
          return false;
        }
        const exists = employees.some(
          (e, idx) => e.id === eid && idx !== editingIndex,
        );
        if (exists) {
          alert("Employee ID already exists. Please use a unique ID.");
          return false;
        }
        return true;
      }

      function onSave() {
        const eid = ($editId.value || "").trim();
        const name = ($editName.value || "").trim();
        const tl = $editTL.value || "";

        if (!validate(eid, name)) return;

        const changedId = eid !== originalId;
        employees[editingIndex] = { id: eid, name, tl };

        // Save to API
        updateEmployee(originalId, name, tl)
          .then(() => {
            closeModal();
            loadEmployees(); // Reload from server
          })
          .catch((err) => {
            alert("Failed to save: " + err.message);
            loadEmployees(); // Reload from server to revert
          });
      }

      function onDelete() {
        if (editingIndex === -1) return;
        const e = employees[editingIndex];
        if (
          confirm(
            `Delete employee ${e.id} - ${e.name}? This cannot be undone.\n\nThis will also remove their daily attendance entries and attrition records.`,
          )
        ) {
          deleteEmployee(e.id)
            .then(() => {
              closeModal();
              loadEmployees(); // Reload from server
            })
            .catch((err) => {
              alert("Failed to delete: " + err.message);
              loadEmployees(); // Reload from server
            });
        }
      }

      /* ===================== Events ===================== */
      let debounce;
      $input.addEventListener("input", (ev) => {
        clearTimeout(debounce);
        debounce = setTimeout(() => {
          searchTerm = ev.target.value || "";
          reRender();
        }, 120);
      });

      $body.addEventListener("click", (ev) => {
        const btn = ev.target.closest('button[data-action="edit"]');
        if (!btn) return;
        const id = btn.getAttribute("data-id");
        openModalEdit(id);
      });

      $btnClose.addEventListener("click", closeModal);
      $btnSave.addEventListener("click", onSave);
      $btnDelete.addEventListener("click", onDelete);
      $modal.addEventListener("click", (e) => {
        if (e.target === $modal) closeModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && $modal.classList.contains("show"))
          closeModal();
        if (e.key === "Enter" && $modal.classList.contains("show")) onSave();
      });

      window.addEventListener("storage", (ev) => {
        if (ev.key === "emp_db") loadEmployees();
      });

      /* ===================== Initial render ===================== */
      loadEmployees();
    </script>
  </body>
</html>
